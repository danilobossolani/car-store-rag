<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoStore — Nagata</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="topo">
        <a href="/" class="marca">AUTO<span>STORE</span></a>
        <p class="subtitulo">🏁 Nagata — converse sobre qualquer carro do catálogo</p>
    </header>

    <main class="nagata-container">
        <div id="chatMensagens" class="chat-mensagens chat-full"></div>
        <div class="chat-input-linha">
            <input type="text" id="chatInput" placeholder="Ex: qual a diferença entre o Creta e o T-Cross?">
            <button id="chatEnviar">Enviar</button>
        </div>
    </main>

    <script src="nagata.js"></script>
</body>

</html>
